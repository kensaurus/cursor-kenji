name: validate

on:
  pull_request:
    paths:
      - "skills/**"
      - "skills-cursor/**"
      - "commands/**"
      - "agents/**"
      - "rules/**"
      - "bin/**"
      - "scripts/**"
  push:
    branches: [main]

jobs:
  spec:
    name: Skill spec + install smoke test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate skills against the Agent Skills spec
        run: node scripts/validate-skills.mjs
      - name: Install smoke test (files preserved, --skill works)
        run: node scripts/test-install.mjs
