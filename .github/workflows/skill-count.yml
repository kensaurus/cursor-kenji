name: skill-count

on:
  pull_request:
    paths:
      - "skills/**"
      - "README.md"
      - "scripts/check-skill-count.mjs"
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify README skill count matches skills/*/SKILL.md
        run: node scripts/check-skill-count.mjs
