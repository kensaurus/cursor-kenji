name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Verify skill count
        run: node scripts/check-skill-count.mjs

      - name: Validate skills against the Agent Skills spec
        run: node scripts/validate-skills.mjs

      - name: Install smoke test
        run: node scripts/test-install.mjs

      # Do NOT set NODE_AUTH_TOKEN — empty secrets block OIDC fallback.
      # Requires Trusted Publisher on npmjs.com for kensaurus/cursor-kenji + this workflow file.
      - name: Publish with provenance
        run: npm publish --provenance --access public
