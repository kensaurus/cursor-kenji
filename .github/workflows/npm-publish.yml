name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Verify skill count
        run: node scripts/check-skill-count.mjs

      - name: Validate skills against the Agent Skills spec
        run: node scripts/validate-skills.mjs

      - name: Install smoke test
        run: node scripts/test-install.mjs

      - name: Secret scanner self-test
        run: node scripts/scan-secrets.mjs --self-test

      - name: MCP pin check
        run: node scripts/check-mcp-pins.mjs

      # OIDC: omit NODE_AUTH_TOKEN when NPM_TOKEN secret is unset so npm uses Trusted Publishing.
      # Fallback: set NPM_TOKEN in GitHub Actions secrets for token-based publish.
      - name: Publish with provenance (OIDC)
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: npm publish --provenance --access public

      - name: Publish with provenance (NPM_TOKEN)
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
